name: Benchmark

on:
  pull_request:
    types:
      - opened
      - synchronize
#    paths: ["**.go"] # TO REVERT !!!
  push:
    branches: [master]
#    paths: ["**.go"] # TO REVERT !!!

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  benchmark:
    name: Regression check
    if: github.event_name == 'push' || ( github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'with-benchmark') )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current code
        uses: actions/checkout@v6
        with:
          # Specify the repository (mostly useful for PR from a fork though)
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.event.after }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Install benchstat & bench-reg tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          go install github.com/yoanm/go-bench-regression/cmd/bench-reg@v0.1.1-0.20260513103403-6cfb94b77c74

      - name: Run benchmarks on current code
        run: |
          set -o pipefail
          make benchmark bench_o="-count=7" | tee ${{ runner.temp }}/current.txt

      - name: Checkout original code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Run benchmarks on original code
        run: |
          set -o pipefail
          make benchmark bench_o="-count=7" | tee previous.txt

      - name: Compare benchmarks
        run: |
          set -o pipefail
          benchstat Previous=previous.txt Current=current.txt | tee benchstat.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ${{ runner.temp }}/current.txt
            previous.txt
            benchstat.txt

      - name: Build summary
        run: |
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchstat.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Detect regressions
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Regressions" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchstat.txt | bench-reg 10 | tee $GITHUB_STEP_SUMMARY
          res=${PIPESTATUS[1]} # Be sure to capture exit code from bench-reg rather than tee !
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          exit $res
  
