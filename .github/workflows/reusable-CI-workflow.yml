name: 'CI reusable workflow'

on:
  workflow_call:

jobs:
  coverage:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Build
        run: make build

      - name: Run tests
        run: make test-go gotest_o="-race -covermode=atomic -coverprofile=coverage.out"

      # Codacy is so dumb that ignoring files from the configuration has no effect on files coverage .....
      # From the doc: Updating the list of ignored files won't have an impact on the amount of coverable and covered lines of the commits 
      # that Codacy compares to calculate the coverage variation metric. Codacy calculates Coverage based solely on what is included in the coverage report. 
      # Therefore, if there are files you wish to keep from being included in the calculation, you should ensure they are not included in the coverage report.
      - name: Strip away unwanted files coverage
        run: sed -i '/github.com\/yoanm\/go-deps-diff\/testing\//d' coverage.out

      - name: Create coverage group
        id: tests-coverage-group
        uses: yoanm/temp-reports-group-workspace/create-group@v0
        with:
          format: clover
          files: coverage.out
          path: build/coverage-groups

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-group
          path: build/coverage-groups
          if-no-files-found: error

  static:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Verify dependencies
        run: make verify-deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Documentation
        env:
          CI: false # If true, command thinks it's goreadme GHAction context (see https://github.com/posener/goreadme/issues/120)
        run: |
          make configure-dev-env && make build-doc
          if [ ! "$(git status -s | wc -l)" -eq 0 ]; then
              echo "::error::Documentation is not up to date ! Run 'make build-doc' "
              exit 1;
          fi
          echo "Documentation is up to date 👌"
          exit 0

      - name: Tidy deps
        run: |
          go mod tidy
          if [ ! "$(git status -s | wc -l)" -eq 0 ]; then
              echo "::error::Run 'go mod tidy' to remove useless deps"
              exit 1;
          fi
          echo "Tidy deps 👌"
          exit 0
