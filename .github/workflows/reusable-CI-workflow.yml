name: 'CI reusable workflow'

on:
  workflow_call:

jobs:
  coverage:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Build
        run: make build

      - name: Run tests
        run: make test-go gotest_o="-race -covermode=atomic -coverprofile=coverage.out"

      - name: Create coverage group
        id: tests-coverage-group
        uses: yoanm/temp-reports-group-workspace/create-group@v0
        with:
          format: clover
          files: coverage.out
          path: build/coverage-groups

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-group
          path: build/coverage-groups
          if-no-files-found: error

  static:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Verify dependencies
        run: make verify-deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Documentation
        env:
          CI: false # If true, command thinks it's goreadme GHAction context (see https://github.com/posener/goreadme/issues/120)
        run: |
          make configure-dev-env && make build-doc
          if [ ! "$(git status -s | wc -l)" -eq 0 ]; then
              echo "::error::Documentation is not up to date ! Run 'make build-doc' "
              exit 1;
          fi
          echo "Documentation is up to date 👌"
          exit 0

  benchmark:
    name: Benchmark regression check
    if: github.event_name == 'push' || ( github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'with-benchmark') )
    needs: [coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          check-latest: true
          cache: true
          cache-dependency-path: ./go.sum

      - name: Install benchstat tool
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on current code
        run: go test -run='^$' -bench=. -benchmem -count=5 ./... > current.txt

      - name: Checkout base branch
        if: github.event_name == 'pull_request'
        run: git checkout ${{ github.base_ref }}

      - name: Checkout previous commit
        if: github.event_name == 'push'
        run: git checkout HEAD~1

      - name: Run benchmarks on original code
        if: github.event_name == 'pull_request'
        run: go test -run='^$' -bench=. -benchmem -count=5 ./... > previous.txt

      - name: Compare benchmarks
        if: github.event_name == 'pull_request'
        run: benchstat previous.txt current.txt > benchmarch_diff.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            current.txt
            previous.txt
            benchmarch_diff.txt

      - name: Build summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmarch_diff.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Detect regressions
        if: github.event_name == 'pull_request'
        run: cat benchmarch_diff.txt | go run ./_tools/.benchmark_regression_checker 10.0
